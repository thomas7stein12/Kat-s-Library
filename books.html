<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="instructor_styles.css" />
    <script
      src="https://kit.fontawesome.com/7178c88896.js"
      crossorigin="anonymous"
    ></script>
    <script src="instructor_index.js"></script>
    <script src="books.js"></script>
  </head>

  <body id="books__body">
    <header id="landing">
    <section>
      <nav>
            <div class="nav__container">
            <img class="logo" src="./assets-2/Library.png" alt="Library Logo">
            <ul class="nav__links">
                <li><a href="index.html" class="nav__link">Home</a></li>
                <li><a href="mailto:thomas7stein12@gmail.com" class="nav__link">Contact</a></li>
            </ul>
            </div>
            <button class="btn__menu" onclick="openMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="menu__backdrop">
                <button class="btn__menu btn__menu-close" onclick="closeMenu()">
                    <i class="fas fa-times"></i>
                </button>
                <ul class="menu__links">
                    <li class="menu__list">
                        <a href="index.html" class="menu__link">Home</a></li>
                    <li class="menu__list">
                        <a href="mailto:thomas7stein12@gmail.com" class="menu__link">Contact</a></li>
                </ul>
            </div>
        </nav>
    </section>
    </header>

    <main id="books__main">
      <section>
        <div class="container">
          <div class="row">
            <div class="books__header">
              <div>
                <h2 class="section__title books__header--title">
                  Explore <span class="purple">Our Collection</span>
                </h2>
                <p class="books__subtitle">
                  Browse our featured books and sort them by price or rating.
                </p>
              </div>

              <select id="filter" onchange="filterBooks(event)">
                <option value="" disabled selected>Sort</option>
                <option value="LOW_TO_HIGH">Price, low to high</option>
                <option value="HIGH_TO_LOW">Price, high to low</option>
                <option value="RATING">Rating</option>
              </select>
            </div>
            <div class="books">
              <i class="fas fa-spinner books__loading--spinner"></i>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <div class="footer_social--list">
        <a
          href="https://github.com/"
          target="_blank"
          class="footer_social--link"
          target="_blank"
          >GitHub
        </a>
        <a
          href="https://www.linkedin.com/"
          target="_blank"
          class="footer_social--link"
          target="_blank"
          >LinkedIn
        </a>
        <a
          href="mailto:thomas7stein12@gmail.com"
          target="_blank"
          class="footer_social--link"
          target="_blank"
          >Email
        </a>
        <a
          href="./Resume (10).pdf"
          target="_blank"
          class="footer_social--link"
          target="_blank"
          download
          >Resume
        </a>
      </div>
      <p>&copy; 2026 Kat's-Library. All rights reserved.</p>
    </footer>
  </body>
</html>
